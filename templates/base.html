<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Smart Adaptive File Compression System — Intelligent storage optimization with OS concepts demonstration">
    <title>{% block title %}SmartCompress{% endblock %} — Smart Adaptive File Compression</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    
    <!-- Styles -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="app-layout">
        <!-- Sidebar Toggle (Mobile) -->
        <button class="sidebar-toggle" id="sidebarToggle" onclick="toggleSidebar()">☰</button>
        <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

        <!-- ── Sidebar ──────────────────────────────────────── -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <a href="/" class="sidebar-brand">
                    <div class="sidebar-logo">⚡</div>
                    <div>
                        <div class="sidebar-title">SmartCompress</div>
                        <div class="sidebar-subtitle">OS Project</div>
                    </div>
                </a>
            </div>

            <nav class="sidebar-nav">
                <div class="nav-section-title">Main</div>
                <a href="/" class="nav-item {% if request.path == '/' %}active{% endif %}" id="nav-dashboard">
                    <span class="nav-icon">📊</span>
                    <span>Dashboard</span>
                </a>
                <a href="/analytics" class="nav-item {% if request.path == '/analytics' %}active{% endif %}" id="nav-analytics">
                    <span class="nav-icon">📈</span>
                    <span>Analytics</span>
                </a>
                <a href="/compression" class="nav-item {% if request.path == '/compression' %}active{% endif %}" id="nav-compression">
                    <span class="nav-icon">🗜️</span>
                    <span>Compression</span>
                </a>

                <div class="nav-section-title" style="margin-top: 16px;">System</div>
                <a href="/settings" class="nav-item {% if request.path == '/settings' %}active{% endif %}" id="nav-settings">
                    <span class="nav-icon">⚙️</span>
                    <span>Settings</span>
                </a>
            </nav>

            <div class="sidebar-footer">
                <div class="status-badge" id="systemStatus">
                    <span class="status-dot" id="statusDot"></span>
                    <span id="statusText">Monitoring Active</span>
                </div>
            </div>
        </aside>

        <!-- ── Main Content ─────────────────────────────────── -->
        <main class="main-content">
            {% block content %}{% endblock %}
        </main>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- Scripts -->
    <script src="{{ url_for('static', filename='js/theme.js') }}"></script>
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
    <script src="{{ url_for('static', filename='js/animations.js') }}"></script>
    {% block scripts %}{% endblock %}

    <script>
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('sidebarOverlay').classList.toggle('active');
        }
    </script>
</body>
</html>
